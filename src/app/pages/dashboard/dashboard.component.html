<title> Ford | Dashboard</title>

<header class="navbar navbar-light bg-white border-bottom px-2 px-md-4 fixed-top d-flex justify-content-between align-items-center" style="height: 75px;">
  
  <div class="d-flex align-items-center gap-2 gap-md-3">
    <app-menu></app-menu>
  </div>

  <div class="position-absolute start-50 translate-middle-x">
    <a href="http://localhost:4200/home">
        <img src="/img/logo-ford-256.png" height="40" alt="Ford Logo" class="img-fluid" style="max-height: 40px;">
    </a>
  </div>

  <div class="d-flex align-items-center">
        <button (click)="logout()" class="btn shadow-sm px-3 px-md-4 btn-custom-logout flex-shrink-0">
      Logout
    </button>
  </div>
  
</header>

<main class="container py-4" style="margin-top: 80px; max-height: 100vh;">

    <div class="row align-items-center mb-4 g-3 mt-2">
    <div class="col-12 col-md-6 text-center text-md-start">
        <h2 class="fw-bold mb-0" style="color: #003478;">Dashboard Ford</h2>
        <p class="text-muted mb-0">Acompanhe os dados:</p>
    </div>

    <div class="col-12 col-md-6">
        <div class="bg-white p-2 rounded-4 shadow-sm d-flex align-items-center w-100">
            <label class="fw-semibold text-secondary mb-0 ms-2 me-2" style="white-space: nowrap;">Veículo:</label>
            
            <select class="form-select border-0 bg-light fw-bold text-dark rounded-3 shadow-none w-100" (change)="onVeiculoChange($event)" style="cursor: pointer;">
                <option value="" [selected]="!veiculoSelecionado">Selecione na lista...</option>
                
                @for (item of veiculos; track item.id) {
                    <option [value]="item.id" [selected]="veiculoSelecionado?.id === item.id">
                        {{ item.vehicle }}
                    </option>
                }
            </select>
        </div>
    </div>
    </div>

    <div class="row g-4 mb-4">
        
        @if (veiculoSelecionado) {
            <div class="col-12 col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 h-100 p-4 d-flex flex-column justify-content-center align-items-center bg-white">
                    <h4 class="fw-bold mb-3 text-secondary">{{ veiculoSelecionado.vehicle }}</h4>
                    <img [src]="veiculoSelecionado.img" [alt]="veiculoSelecionado.vehicle" class="img-fluid" style="max-height: 220px; object-fit: contain; filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.15));">
                </div>
            </div>
        }

        <div class="col-12" [ngClass]="veiculoSelecionado ? 'col-lg-7' : 'col-lg-12'">
            <div class="row g-3 h-100">
                <div class="col-12 col-md-4">
                    <app-card [titulo]="'Total de Vendas'" [valor]="veiculoSelecionado?.volumetotal || 0"></app-card>
                </div>
                <div class="col-12 col-md-4">
                    <app-card [titulo]="'Conectados'" [valor]="veiculoSelecionado?.connected || 0"></app-card>
                </div>
                <div class="col-12 col-md-4">
                    <app-card [titulo]="'Update Software'" [valor]="veiculoSelecionado?.softwareUpdates || 0"></app-card>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-bottom p-4">
            <h5 class="fw-bold mb-0" style="color: #003478;">Pesquisar VIN:</h5>
        </div>
        <div class="card-body p-0">
            <app-car-table 
                [dados]="dadosTabela" 
                [vin]="vinSelecionado"
                (buscarVin)="onBuscarVinManual($event)">
            </app-car-table>
        </div>
    </div>

</main>
