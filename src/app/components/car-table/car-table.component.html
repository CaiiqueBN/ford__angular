<div class="table-responsive">
    <table class="table table-hover table-borderless align-middle mb-0">
        <thead class="table-light text-muted" style="font-size: 0.85rem; letter-spacing: 0.5px;">
            <tr>
                <th class="py-3 px-4 fw-semibold text-start" style="width: 320px;">NÚMERO DO VIN</th>
                <th class="py-3 px-3 fw-semibold text-center">ODÔMETRO</th>
                <th class="py-3 px-3 fw-semibold text-center">COMBUSTÍVEL</th>
                <th class="py-3 px-3 fw-semibold text-center">STATUS</th>
                <th class="py-3 px-3 fw-semibold text-center">LOCALIZAÇÃO (LAT / LONG)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="py-3 px-4">
                    <input 
                        type="text" 
                        class="form-control form-control-lg font-monospace bg-light border-0 shadow-none text-uppercase" 
                        placeholder="Digite o VIN e aperte Enter"
                        [value]="vin"
                        (keydown.enter)="onVinSubmit($event)"
                        (blur)="onVinSubmit($event)">
                </td>
                
                @if (dados) {
                    <td class="py-3 px-3 fw-bold text-dark text-center">{{ dados.odometro }} Km</td>
                    <td class="py-3 px-3 fw-bold text-dark text-center">{{ dados.nivelCombustivel }}%</td>
                    <td class="py-3 px-3 text-center">
                        <span class="badge rounded-pill px-3 py-2 shadow-sm" [ngClass]="dados.status === 'on' ? 'bg-success' : 'bg-danger'">
                            {{ dados.status | uppercase }}
                        </span>
                    </td>
                    <td class="py-3 px-3 text-muted text-center">
                        <div class="d-flex flex-column align-items-center">
                            <span>{{ dados.lat }}</span>
                            <span>{{ dados.long }}</span>
                        </div>
                    </td>
                } @else {
                    <td colspan="4" class="text-center py-4 text-muted">
                        <em>Nenhum dado de telemetria carregado. Busque por um VIN válido.</em>
                    </td>
                }
            </tr>
        </tbody>
    </table>
</div>
