<div class="container-fluid px-0">
        <div class="row mx-0 bg-light text-muted border-bottom d-none d-md-flex align-items-center" style="font-size: 0.85rem; letter-spacing: 0.5px;">
        <div class="col-md-4 py-3 px-4 fw-semibold text-start">NÚMERO DO VIN</div>
        <div class="col-md-2 py-3 px-3 fw-semibold text-center">ODÔMETRO</div>
        <div class="col-md-2 py-3 px-3 fw-semibold text-center">COMBUSTÍVEL</div>
        <div class="col-md-2 py-3 px-3 fw-semibold text-center">STATUS</div>
        <div class="col-md-2 py-3 px-3 fw-semibold text-center">LOCALIZAÇÃO</div>
    </div>

        <div class="row mx-0 align-items-center py-3">
        
                <div class="col-12 col-md-4 px-4 mb-3 mb-md-0">
                        <label class="d-block d-md-none fw-bold text-muted mb-2" style="font-size: 0.85rem;">NÚMERO DO VIN:</label>
            <input 
                type="text" 
                class="form-control form-control-lg font-monospace bg-light border-0 shadow-none text-uppercase" 
                placeholder="Digite o VIN e aperte Enter"
                [value]="vin"
                (keydown.enter)="onVinSubmit($event)"
                (blur)="onVinSubmit($event)">
        </div>

        @if (dados) {
                        <div class="col-6 col-md-2 px-4 px-md-3 mb-3 mb-md-0 text-md-center">
                <label class="d-block d-md-none fw-semibold text-muted mb-1" style="font-size: 0.75rem;">ODÔMETRO</label>
                <span class="fw-bold text-dark">{{ dados.odometro }} Km</span>
            </div>
            
                        <div class="col-6 col-md-2 px-4 px-md-3 mb-3 mb-md-0 text-md-center">
                <label class="d-block d-md-none fw-semibold text-muted mb-1" style="font-size: 0.75rem;">COMBUSTÍVEL</label>
                <span class="fw-bold text-dark">{{ dados.nivelCombustivel }}%</span>
            </div>

                        <div class="col-6 col-md-2 px-4 px-md-3 text-md-center">
                <label class="d-block d-md-none fw-semibold text-muted mb-2" style="font-size: 0.75rem;">STATUS</label>
                <span class="badge rounded-pill px-3 py-2 shadow-sm" [ngClass]="dados.status === 'on' ? 'bg-success' : 'bg-danger'">
                    {{ dados.status | uppercase }}
                </span>
            </div>

                        <div class="col-6 col-md-2 px-4 px-md-3 text-md-center">
                <label class="d-block d-md-none fw-semibold text-muted mb-1" style="font-size: 0.75rem;">LOCALIZAÇÃO</label>
                <div class="text-muted d-flex flex-column align-items-start align-items-md-center">
                    <span>{{ dados.lat }}</span>
                    <span>{{ dados.long }}</span>
                </div>
            </div>
        } @else {
                        <div class="col-12 col-md-8 text-center py-4 text-muted">
                <em>Nenhum dado de telemetria carregado. Busque por um VIN válido.</em>
            </div>
        }
    </div>
</div>
