<table class="mt-2 table">
    <thead>
        <tr>
            <th class="p-3">VIN</th>
            <th class="p-3">ODOMETRO</th>
            <th class="p-3">NÍVEL DO COMBUSTÍVEL</th>
            <th class="p-3">STATUS</th>
            <th class="p-3">LAT</th>
            <th class="p-3">LONG</th>
        </tr>
    </thead>
    <tbody>
        @if (dados) {
            <tr>
                <td class="p-3 font-monospace">{{ vin }}</td>
                <td class="p-3">{{ dados.odometro }} Km</td>
                <td class="p-3">{{ dados.nivelCombustivel }}%</td>
                <td class="p-3">
                    <span class="badge" [ngClass]="dados.status === 'on' ? 'bg-success' : 'bg-danger'">
                        {{ dados.status | uppercase }}
                    </span>
                </td>
                <td class="p-3">{{ dados.lat }}</td>
                <td class="p-3">{{ dados.long }}</td>
            </tr>
        } @else {
            <tr>
                <td colspan="6" class="text-center p-4 text-muted">
                    Selecione um veículo acima para carregar os dados detalhados.
                </td>
            </tr>
        }
    </tbody>
</table>
